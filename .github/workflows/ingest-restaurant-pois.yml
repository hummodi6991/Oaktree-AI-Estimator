name: Ingest Restaurant POIs

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources to ingest (default: all)"
        required: false
        default: "overture,osm,delivery"
      overture:
        description: "Include Overture Maps data"
        type: boolean
        default: true
      osm:
        description: "Include OpenStreetMap data"
        type: boolean
        default: true
      delivery:
        description: "Include delivery platform scraping (all 16 platforms)"
        type: boolean
        default: true
      delivery_platforms:
        description: "Specific delivery platforms (comma-separated, e.g. hungerstation,jahez,keeta). Empty = all."
        required: false
        default: ""
  schedule:
    - cron: "0 3 * * 1"  # Weekly Monday 03:00 UTC

# Prevent two ingestion runs from overlapping
concurrency:
  group: ingest-restaurant-pois
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install duckdb pyarrow

      - name: Configure DB env
        env:
          PGHOST_S: ${{ secrets.POSTGRES_HOST }}
          PGPORT_S: ${{ secrets.POSTGRES_PORT }}
          PGDB_S:   ${{ secrets.POSTGRES_DB }}
          PGUSER_S: ${{ secrets.POSTGRES_USER }}
          PGPASS_S: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          {
            echo "POSTGRES_HOST=${PGHOST_S}"
            echo "POSTGRES_PORT=${PGPORT_S}"
            echo "POSTGRES_DB=${PGDB_S}"
            echo "POSTGRES_USER=${PGUSER_S}"
            echo "POSTGRES_PASSWORD=${PGPASS_S}"
          } >> "$GITHUB_ENV"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Resolve source list
        id: sources
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "list=overture,osm,delivery" >> "$GITHUB_OUTPUT"
            echo "delivery_platforms=" >> "$GITHUB_OUTPUT"
          else
            DP="${{ github.event.inputs.delivery_platforms }}"
            LIST=""
            # When specific delivery platforms are requested and overture/osm
            # are left at their defaults, only run delivery.  This prevents
            # a HungerStation-only debug run from also re-running Overture/OSM.
            if [ -n "$DP" ]; then
              # Explicit platform filter — default to delivery-only unless
              # the user toggled overture/osm checkboxes to true explicitly.
              if [ "${{ github.event.inputs.overture }}" = "true" ] && [ -z "$DP" ]; then LIST="${LIST}overture,"; fi
              if [ "${{ github.event.inputs.osm }}" = "true" ] && [ -z "$DP" ]; then LIST="${LIST}osm,"; fi
              LIST="${LIST}delivery,"
            else
              if [ "${{ github.event.inputs.overture }}" = "true" ]; then LIST="${LIST}overture,"; fi
              if [ "${{ github.event.inputs.osm }}" = "true" ]; then LIST="${LIST}osm,"; fi
              if [ "${{ github.event.inputs.delivery }}" = "true" ]; then LIST="${LIST}delivery,"; fi
            fi
            FINAL="${LIST:-${{ github.event.inputs.sources }}}"
            echo "list=${FINAL%,}" >> "$GITHUB_OUTPUT"
            echo "delivery_platforms=${DP}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ingest restaurant POIs
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          import logging, sys
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)-8s %(name)s  %(message)s')
          logger = logging.getLogger('ingest-workflow')

          from app.db.session import SessionLocal
          from app.ingest.restaurant_pois import (
              ingest_overture_restaurants,
              ingest_osm_restaurants,
              ingest_delivery_platforms,
          )

          sources = '${{ steps.sources.outputs.list }}'.split(',')
          sources = [s.strip() for s in sources if s.strip()]
          logger.info('Sources to ingest: %s', sources)

          delivery_filter = '${{ steps.sources.outputs.delivery_platforms }}'.strip()
          delivery_sources = [s.strip() for s in delivery_filter.split(',') if s.strip()] if delivery_filter else None
          if delivery_sources:
              logger.info('Delivery platforms filter: %s', delivery_sources)

          results = {}

          if 'overture' in sources:
              db = SessionLocal()
              try:
                  results['overture'] = ingest_overture_restaurants(db)
              except Exception as exc:
                  logger.error('Overture ingestion failed: %s', exc)
                  results['overture'] = 0
              finally:
                  db.close()

          if 'osm' in sources:
              db = SessionLocal()
              try:
                  results['osm'] = ingest_osm_restaurants(db)
              except Exception as exc:
                  logger.error('OSM ingestion failed: %s', exc)
                  results['osm'] = 0
              finally:
                  db.close()

          if 'delivery' in sources:
              try:
                  results['delivery_platforms'] = ingest_delivery_platforms(sources=delivery_sources)
              except Exception as exc:
                  logger.error('Delivery ingestion failed: %s', exc)
                  results['delivery_platforms'] = 0

          logger.info('Ingestion complete: %s', results)
          "

      - name: Smoke test — category breakdown
        run: |
          python -c "
          from app.db.session import SessionLocal
          from sqlalchemy import text
          db = SessionLocal()
          result = db.execute(text('SELECT category, count(*) FROM restaurant_poi GROUP BY category ORDER BY count DESC')).fetchall()
          total = 0
          for row in result:
              print(f'{row[0]}: {row[1]}')
              total += row[1]
          print(f'Total: {total}')
          db.close()
          "

      - name: Smoke test — source breakdown
        run: |
          python -c "
          from app.db.session import SessionLocal
          from sqlalchemy import text
          db = SessionLocal()
          result = db.execute(text('SELECT source, count(*) FROM restaurant_poi GROUP BY source ORDER BY count DESC')).fetchall()
          for row in result:
              print(f'{row[0]}: {row[1]}')
          db.close()
          "
