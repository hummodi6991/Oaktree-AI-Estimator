name: Enrich Google Reviews

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max rows to enrich (0 = unlimited)"
        type: number
        default: 500
      force:
        description: "Re-enrich even if recently fetched"
        type: boolean
        default: false
      only_missing:
        description: "Only enrich rows missing Google data (set false for a one-time full refresh)"
        type: boolean
        default: true
      reset_cursor:
        description: "Reset resume cursor before starting (recommended for full refresh)"
        type: boolean
        default: false

concurrency:
  group: enrich-google-reviews
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure DB env
        env:
          PGHOST_S: ${{ secrets.POSTGRES_HOST }}
          PGPORT_S: ${{ secrets.POSTGRES_PORT }}
          PGDB_S:   ${{ secrets.POSTGRES_DB }}
          PGUSER_S: ${{ secrets.POSTGRES_USER }}
          PGPASS_S: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          {
            echo "POSTGRES_HOST=${PGHOST_S}"
            echo "POSTGRES_PORT=${PGPORT_S}"
            echo "POSTGRES_DB=${PGDB_S}"
            echo "POSTGRES_USER=${PGUSER_S}"
            echo "POSTGRES_PASSWORD=${PGPASS_S}"
          } >> "$GITHUB_ENV"

      - name: Run Alembic migrations
        run: alembic upgrade heads

      - name: Resolve inputs
        id: inputs
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          echo "limit=${LIMIT:-500}" >> "$GITHUB_OUTPUT"
          echo "force=${{ github.event.inputs.force }}" >> "$GITHUB_OUTPUT"
          echo "only_missing=${{ github.event.inputs.only_missing }}" >> "$GITHUB_OUTPUT"
          echo "reset_cursor=${{ github.event.inputs.reset_cursor }}" >> "$GITHUB_OUTPUT"

      - name: Enrich restaurant POIs with Google Reviews
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          ARGS="--resume --batch-size 200"

          # If user requested a cursor reset, do it.
          if [ "${{ steps.inputs.outputs.reset_cursor }}" = "true" ]; then
            ARGS="$ARGS --reset"
          fi

          LIMIT="${{ steps.inputs.outputs.limit }}"
          if [ "$LIMIT" != "0" ] && [ -n "$LIMIT" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          if [ "${{ steps.inputs.outputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          # Full refresh: ensure we don't accidentally "resume past" everything.
          # If only_missing is false (full refresh) and user did not explicitly reset_cursor,
          # reset cursor automatically to avoid processed=0 runs.
          if [ "${{ steps.inputs.outputs.only_missing }}" != "true" ]; then
            ARGS="$ARGS --no-only-missing"
            if [ "${{ steps.inputs.outputs.reset_cursor }}" != "true" ]; then
              ARGS="$ARGS --reset"
            fi
          fi

          echo "Running: python -m app.ingest.google_reviews_enrich $ARGS"
          python -m app.ingest.google_reviews_enrich $ARGS

      - name: Smoke test — enrichment coverage
        run: |
          python -c "
          from app.db.session import SessionLocal
          from sqlalchemy import text
          db = SessionLocal()
          total = db.execute(text('SELECT count(*) FROM restaurant_poi')).scalar()
          enriched = db.execute(text('SELECT count(*) FROM restaurant_poi WHERE google_place_id IS NOT NULL')).scalar()
          fresh = db.execute(text(\"\"\"SELECT count(*) FROM restaurant_poi WHERE google_fetched_at >= now() - interval '30 days'\"\"\")).scalar()
          cursor_row = db.execute(text('SELECT last_cursor FROM google_reviews_enrich_state WHERE id = 1')).first()
          last_cursor = cursor_row[0] if cursor_row else 'N/A'
          print(f'Total POIs: {total}')
          print(f'Google enriched: {enriched}')
          print(f'Fresh (last 30d): {fresh}')
          if total > 0:
              print(f'Coverage: {enriched/total*100:.1f}%')
          print(f'Last cursor: {last_cursor}')
          db.close()
          "
