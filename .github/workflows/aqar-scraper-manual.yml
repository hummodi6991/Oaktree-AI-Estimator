name: Aqar Scraper (Manual)

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Maximum pages to scrape per listing type"
        required: false
        default: "500"
      no_detail:
        description: "Skip detail page scraping (--no-detail)"
        type: boolean
        default: false
      skip_geocode:
        description: "Skip geocoding step (--skip-geocode)"
        type: boolean
        default: false
      listing_type:
        description: "Listing types to crawl"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - store
          - showroom
          - warehouse
          - building
  schedule:
    # Every Monday at 02:00 UTC (05:00 Riyadh time) — off-peak
    - cron: '0 2 * * 1'

concurrency:
  group: aqar-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 360  # 6 hours

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Aqar scraper
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE: ${{ secrets.POSTGRES_SSLMODE }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          MAX_PAGES="${{ github.event.inputs.max_pages || '500' }}"
          LISTING_TYPE="${{ github.event.inputs.listing_type || 'all' }}"
          NO_DETAIL="${{ github.event.inputs.no_detail || 'false' }}"
          SKIP_GEOCODE="${{ github.event.inputs.skip_geocode || 'false' }}"
          FLAGS="--max-pages ${MAX_PAGES}"
          FLAGS="${FLAGS} --listing-type ${LISTING_TYPE}"
          if [ "${NO_DETAIL}" = "true" ]; then
            FLAGS="${FLAGS} --no-detail"
          fi
          if [ "${SKIP_GEOCODE}" = "true" ]; then
            FLAGS="${FLAGS} --skip-geocode"
          fi
          FLAGS="${FLAGS} --resume"
          echo "Running: python scripts/scrape_aqar.py ${FLAGS}"
          python scripts/scrape_aqar.py ${FLAGS}
