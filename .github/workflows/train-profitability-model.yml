name: Train Profitability Model

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"  # Weekly Sunday 06:00 UTC

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train profitability model
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE: ${{ secrets.POSTGRES_SSLMODE }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m app.ml.profitability_train

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: profitability-model
          path: |
            models/profitability_v1.pkl
            models/profitability_v1.meta.json
          retention-days: 90

      - name: Print results
        if: always()
        run: |
          if [ -f models/profitability_v1.meta.json ]; then
            python3 -c "
          import json
          with open('models/profitability_v1.meta.json') as f:
              meta = json.load(f)
          print(f'MAE: {meta.get(\"mae\", \"N/A\")}')
          print(f'R2: {meta.get(\"r2\", \"N/A\")}')
          print(f'Training rows: {meta.get(\"n_rows\", \"N/A\")}')
          print(f'Candidates scored: {meta.get(\"candidates_scored\", \"N/A\")}')
          print()
          print('Feature Importances:')
          for feat, imp in sorted(meta.get('feature_importances', {}).items(), key=lambda x: -x[1]):
              print(f'  {feat}: {imp:.4f}')
          "
          fi
