name: "Expansion Advisor Data — Roads & Access"

on:
  schedule:
    - cron: "0 3 * * 1"  # Weekly on Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      pbf_url:
        description: "PBF URL for OSM import"
        required: false
        default: "https://download.geofabrik.de/asia/saudi-arabia-latest.osm.pbf"
      replace_mode:
        description: "Replace existing Riyadh rows"
        required: false
        default: "true"
      refresh_after:
        description: "Run post-ingestion refresh"
        required: false
        default: "true"

jobs:
  ingest-roads:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT || '5432' }}
      PGSSLMODE: ${{ secrets.PGSSLMODE || 'require' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y osm2pgsql osmium-tool postgresql-client libgeos-dev

      - name: Install Python requirements
        run: pip install -r requirements.txt

      - name: Configure DB with SSL
        run: |
          echo "DB connection configured via env vars"

      - name: Run alembic upgrade
        run: python -m alembic upgrade heads

      - name: Import OSM data if needed
        env:
          PGHOST: ${{ secrets.POSTGRES_HOST }}
          PGPORT: ${{ secrets.POSTGRES_PORT || '5432' }}
          PGDATABASE: ${{ secrets.POSTGRES_DB }}
          PGUSER: ${{ secrets.POSTGRES_USER }}
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          PBF_URL="${{ github.event.inputs.pbf_url || 'https://download.geofabrik.de/asia/saudi-arabia-latest.osm.pbf' }}"
          echo "PBF URL: $PBF_URL"

          # Check both planet_osm_line and planet_osm_roads before importing
          LINE_COUNT=$(psql -tAc "SELECT COUNT(*) FROM planet_osm_line;" 2>/dev/null || echo "0")
          ROADS_COUNT=$(psql -tAc "SELECT COUNT(*) FROM planet_osm_roads;" 2>/dev/null || echo "0")
          echo "Current planet_osm_line rows: $LINE_COUNT"
          echo "Current planet_osm_roads rows: $ROADS_COUNT"

          # Skip import if either table already has data
          if [ "${LINE_COUNT:-0}" != "0" ] && [ "$LINE_COUNT" != "" ]; then
            echo "planet_osm_line already populated ($LINE_COUNT rows), skipping import"
            exit 0
          fi
          if [ "${ROADS_COUNT:-0}" != "0" ] && [ "$ROADS_COUNT" != "" ]; then
            echo "planet_osm_roads already populated ($ROADS_COUNT rows), skipping import"
            exit 0
          fi

          echo "No OSM road data found — downloading and importing PBF"
          psql -c "CREATE EXTENSION IF NOT EXISTS postgis;"

          # Download the full PBF
          curl -L "$PBF_URL" -o /tmp/osm-full.osm.pbf

          # Clip to Riyadh bounding box using osmium to reduce import size/time
          # Bbox: min_lon=46.3, min_lat=24.4, max_lon=47.1, max_lat=25.0
          echo "Clipping PBF to Riyadh bounding box with osmium..."
          osmium extract \
            --bbox 46.3,24.4,47.1,25.0 \
            --strategy smart \
            /tmp/osm-full.osm.pbf \
            -o /tmp/osm-riyadh.osm.pbf \
            --overwrite
          rm -f /tmp/osm-full.osm.pbf

          # Import clipped PBF with --latlong (stores in SRID 4326)
          STYLE_PATH="/usr/share/osm2pgsql/default.style"
          osm2pgsql --create --slim --latlong --hstore --multi-geometry \
            --style "${STYLE_PATH}" \
            -d "${PGDATABASE}" \
            /tmp/osm-riyadh.osm.pbf
          rm -f /tmp/osm-riyadh.osm.pbf

          echo "OSM import complete (Riyadh clip)"
          psql -c "SELECT 'planet_osm_line' AS tbl, COUNT(*) FROM planet_osm_line UNION ALL SELECT 'planet_osm_roads', COUNT(*) FROM planet_osm_roads;"

      - name: Run Roads & Access ingest
        run: |
          python -m app.ingest.expansion_advisor_roads \
            --replace ${{ github.event.inputs.replace_mode || 'true' }} \
            --write-stats /tmp/roads-stats.json

      - name: Run post-ingestion refresh
        if: ${{ github.event.inputs.refresh_after != 'false' }}
        run: |
          python -m app.ingest.expansion_advisor_refresh \
            --skip-alembic \
            --write-stats /tmp/refresh-stats.json

      - name: Print row counts
        run: |
          python -c "
          from app.db.session import engine
          from sqlalchemy import text
          with engine.connect() as c:
              r = c.execute(text('SELECT COUNT(*) FROM expansion_road_context')).scalar()
              print(f'expansion_road_context: {r} rows')
          "

      - name: Upload stats artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: expansion-advisor-roads-stats
          path: /tmp/*-stats.json
          retention-days: 30
