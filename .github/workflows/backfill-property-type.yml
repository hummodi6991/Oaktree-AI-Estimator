name: Backfill Property Type (Manual)

on:
  workflow_dispatch:

concurrency:
  group: backfill-property-type
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 300  # 5 hours — backfill takes ~1.5h, plenty of headroom

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run property_type backfill
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE: ${{ secrets.POSTGRES_SSLMODE }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/backfill_property_type.py
