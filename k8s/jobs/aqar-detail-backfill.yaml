apiVersion: batch/v1
kind: Job
metadata:
  name: aqar-detail-backfill
  labels: { app: aqar-detail-backfill }
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 604800  # keep logs for 7 days for review
  # ~2,295 active listings × 1.5s = ~57 minutes of HTTP sleep alone, plus
  # parse / DB work. 4 hours of headroom covers retry storms and gives
  # us time to notice before K8s kills the pod.
  activeDeadlineSeconds: 14400
  template:
    metadata:
      labels: { app: aqar-detail-backfill }
    spec:
      restartPolicy: Never
      containers:
        - name: backfill
          image: IMAGE_PLACEHOLDER
          command:
            - python
            - scripts/backfill_aqar_detail_fields.py
          env:
            - name: PYTHONPATH
              value: /app
          envFrom:
            - secretRef:
                name: oaktree-db-env
            - secretRef:
                name: oaktree-app-env
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
