apiVersion: batch/v1
kind: CronJob
metadata:
  name: aqar-scraper
  labels: { app: aqar-scraper }
spec:
  schedule: "0 0 * * 0"  # Weekly: Sunday midnight UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels: { app: aqar-scraper }
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400  # Clean up after 24h
      # Phase 2 Info-block parse reuses the existing detail-page HTML
      # (no new HTTP per listing), so the 4h ceiling remains adequate.
      activeDeadlineSeconds: 14400    # 4h hard timeout
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: scraper
              image: IMAGE_PLACEHOLDER
              command:
                - python
                - scripts/scrape_aqar.py
                - --max-pages
                - "5"
              env:
                - name: GOOGLE_MAPS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: oaktree-app-env
                      key: GOOGLE_MAPS_API_KEY
              envFrom:
                - secretRef:
                    name: oaktree-db-env
                - secretRef:
                    name: oaktree-app-env
              resources:
                requests: { cpu: "100m", memory: "256Mi" }
                limits:   { cpu: "500m", memory: "512Mi" }
